<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 number styles</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Geist:wght@300;400;600;700;800&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0b0b;
    color: #fff;
    font-family: "Geist", system-ui, sans-serif;
    padding: 56px 40px 80px;
  }
  h1 { font-size: 13px; text-transform: uppercase; letter-spacing: .2em; color: rgba(255,255,255,.4); font-weight: 500; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; max-width: 1400px; margin: 0 auto; }
  .cell {
    border: 1px solid rgba(255,255,255,.10);
    background: #0b0b0b;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 24px;
  }
  .tag {
    position: absolute; top: 16px; left: 16px;
    font-size: 10px; text-transform: uppercase; letter-spacing: .2em;
    color: rgba(255,255,255,.35); font-weight: 600;
  }
  .num { line-height: .82; user-select: none; }

  /* 1 — hand-scrawled red (current) */
  .s1 { font-family: "Caveat", cursive; font-weight: 600; font-size: 200px; color: #ff2e2e; transform: rotate(-6deg); }

  /* 2 — solid white, footer-wordmark style */
  .s2 { font-weight: 600; font-size: 190px; letter-spacing: -.05em; color: #fff; }

  /* 3 — outline / stroke only */
  .s3 { font-weight: 800; font-size: 190px; letter-spacing: -.04em; color: transparent; -webkit-text-stroke: 2px rgba(255,255,255,.7); }

  /* 4 — solid red, geometric */
  .s4 { font-weight: 700; font-size: 190px; letter-spacing: -.05em; color: #ff2e2e; }

  /* 5 — monospace bracketed terminal */
  .s5 { font-family: "Geist Mono", monospace; font-weight: 400; font-size: 96px; letter-spacing: .04em; color: #fff; }
  .s5 b { color: rgba(255,255,255,.3); font-weight: 400; padding: 0 .15em; }

  /* 6 — duplex / offset glitch */
  .s6 { position: relative; font-weight: 700; font-size: 190px; letter-spacing: -.05em; }
  .s6 .base { color: #fff; }
  .s6 .ghost { position: absolute; inset: 0; color: #ff2e2e; transform: translate(10px, 8px); z-index: -1; }

  /* 7 — ultra-thin wide */
  .s7 { font-weight: 300; font-size: 170px; letter-spacing: .12em; color: #fff; }

  /* 8 — scrawl but white (subtler) */
  .s8 { font-family: "Caveat", cursive; font-weight: 700; font-size: 200px; color: #fff; transform: rotate(-4deg); }
</style>
</head>
<body>
  <h1>ARRVL · 404 number styles — only the number varies</h1>
  <div class="grid">
    <div class="cell"><span class="tag">01 · scrawl red (current)</span><span class="num s1">404</span></div>
    <div class="cell"><span class="tag">02 · solid white</span><span class="num s2">404</span></div>
    <div class="cell"><span class="tag">03 · outline stroke</span><span class="num s3">404</span></div>
    <div class="cell"><span class="tag">04 · solid red</span><span class="num s4">404</span></div>
    <div class="cell"><span class="tag">05 · mono bracketed</span><span class="num s5"><b>[</b>404<b>]</b></span></div>
    <div class="cell"><span class="tag">06 · duplex offset</span><span class="num s6"><span class="base">404</span><span class="ghost">404</span></span></div>
    <div class="cell"><span class="tag">07 · ultra-thin wide</span><span class="num s7">404</span></div>
    <div class="cell"><span class="tag">08 · scrawl white</span><span class="num s8">404</span></div>
  </div>
</body>
</html>
